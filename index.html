<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Text To Speech Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Text To Speech Converter</h1>

    <label for="voiceSelect">Voice:</label>
    <select id="voiceSelect"></select>

    <label for="rate">Rate: <span id="rateValue">1</span></label>
    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" />

    <label for="pitch">Pitch: <span id="pitchValue">1</span></label>
    <input type="range" id="pitch" min="0" max="2" value="1" step="0.1" />

    <textarea id="text" placeholder="Type or paste text here..."></textarea>

    <div class="buttons">
      <button id="speakBtn">Speak</button>
      <button id="pauseBtn">Pause</button>
      <button id="resumeBtn">Resume</button>
      <button id="stopBtn">Stop</button>
    </div>

    <p class="note">
      Note: Works in modern browsers that support the Web Speech (SpeechSynthesis) API.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
